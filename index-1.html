<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="stylesheet" href="style.css"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; box-sizing: border-box; }

    body { background: #202020; min-height: 100vh; }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .auth-card {
      background: linear-gradient(135deg, #ffd2fb, #5866ff);
      border-radius: 20px; padding: 40px 35px; width: 100%; max-width: 420px;
      color: #fff; text-align: center;
    }
    .auth-card h2 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
    .auth-card p.subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 28px; }

    .auth-tabs { display: flex; background: rgba(255,255,255,0.2); border-radius: 30px;
      padding: 4px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 8px; border-radius: 26px; border: none; background: transparent;
      color: #fff; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.2s; }
    .auth-tab.active { background: rgba(255,255,255,0.35); }

    .auth-input {
      width: 100%; border: 0; outline: 0; background: #ebfffc; color: #555;
      padding: 14px 20px; border-radius: 30px; font-size: 15px; font-family: 'Poppins', sans-serif;
      margin-bottom: 12px; display: block;
    }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 30px; border: none;
      background: rgba(255,255,255,0.25); color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;
      margin-top: 4px; letter-spacing: 0.3px;
    }
    .auth-btn:hover { background: rgba(255,255,255,0.38); }
    .auth-error { font-size: 13px; color: #ffe0e0; margin-top: 10px; min-height: 18px; }

    /* ── MAIN APP ── */
    #app-screen { display: none; padding: 30px 20px 60px; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 500px; margin: 0 auto 20px;
    }
    .user-info { color: #aaa; font-size: 13px; }
    .user-info span { color: #ffd2fb; font-weight: 500; }
    .logout-btn {
      background: transparent; border: 1px solid #555; color: #aaa;
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #ffd2fb; color: #ffd2fb; }

    /* ── WEATHER CARD (preserved original style) ── */
    .card {
      width: 100%; max-width: 500px;
      background: linear-gradient(135deg, #ffd2fb, #5866ff);
      color: #fff; margin: 0 auto; border-radius: 20px;
      padding: 40px 35px; text-align: center;
    }
    .search { width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .search input {
      border: 0; outline: 0; background: #ebfffc; color: #555;
      padding: 10px 25px; height: 60px; border-radius: 30px;
      flex: 1; margin-right: 16px; font-size: 18px; font-family: 'Poppins', sans-serif;
    }
    .search button {
      border: 0; outline: 0; background: #ebfffc; border-radius: 50%;
      width: 60px; height: 60px; cursor: pointer; font-size: 22px;
      transition: transform 0.15s;
    }
    .search button:hover { transform: scale(1.08); }
    .weather h1 { font-size: 80px; font-weight: 500; }
    .weather h2 { font-size: 45px; font-weight: 400; margin-top: -10px; }
    .details {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; margin-top: 50px;
    }
    .col { display: flex; align-items: center; text-align: left; }
    .col img { width: 40px; margin-right: 10px; }
    .humidity, .wind { font-size: 28px; margin-top: -6px; }
    .weather { display: none; }
    .error { text-align: left; margin-left: 10px; font-size: 14px; margin-top: 10px; display: none; }
    .weathericon { margin-top: 20px; }

    /* ── HISTORY PANEL ── */
    .history-panel {
      width: 100%; max-width: 500px; margin: 20px auto 0;
      background: #2a2a2a; border-radius: 16px; overflow: hidden;
    }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #333;
    }
    .history-header h3 { color: #ccc; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
    .clear-btn {
      background: transparent; border: none; color: #666; font-size: 12px;
      font-family: 'Poppins', sans-serif; cursor: pointer; transition: color 0.2s;
    }
    .clear-btn:hover { color: #ffd2fb; }
    #history-list { padding: 8px 0; max-height: 280px; overflow-y: auto; }
    #history-list:empty::after {
      content: 'No searches yet'; display: block; text-align: center;
      color: #555; font-size: 13px; padding: 20px;
    }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; cursor: pointer; transition: background 0.15s;
    }
    .history-item:hover { background: #333; }
    .history-item-left { display: flex; align-items: center; gap: 12px; }
    .history-item-city { color: #eee; font-size: 14px; font-weight: 500; }
    .history-item-temp { color: #aaa; font-size: 13px; }
    .history-item-time { color: #555; font-size: 11px; }

    /* loading spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     STEP 2 — RUN THIS SQL IN SUPABASE
     Go to SQL Editor and run:

  create table search_history (
    id uuid default gen_random_uuid() primary key,
    user_id uuid references auth.users not null,
    city text not null,
    temp text,
    searched_at timestamptz default now()
  );

  alter table search_history enable row level security;

  create policy "Users can manage own history"
    on search_history for all
    using (auth.uid() = user_id);

════════════════════════════════════════════ -->

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <h2>Weather App</h2>
    <p class="subtitle">Sign in to save your search history</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <input class="auth-input" type="email" id="auth-email" placeholder="Email address" />
    <input class="auth-input" type="password" id="auth-password" placeholder="Password" />
    <button class="auth-btn" onclick="handleAuth()">
      <span id="auth-btn-text">Login</span>
    </button>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<!-- MAIN APP SCREEN -->
<div id="app-screen">

  <div class="top-bar">
    <div class="user-info">Logged in as <span id="user-email-display"></span></div>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>

  <!-- Original weather card, preserved -->
  <div class="card">
    <div class="search">
      <input type="search" id="search-input" placeholder="Enter City Name" spellcheck="false">
      <button onclick="triggerSearch()">🔍</button>
    </div>
    <div class="error"><p>Invalid City</p></div>
    <br><br>
    <div class="weather">
      <img src="thunder ico.png" class="weathericon" id="weathericon" width="170px" height="170px" />
      <br><br>
      <h1 class="temp">22°c</h1>
      <br>
      <h2 class="city">New York</h2>
      <div class="details">
        <div class="col">
          <img src="thermameter.png" width="50px" height="50px" />
          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>
        <div class="col">
          <img src="windy.png" width="50px" height="50px" />
          <div>
            <p class="wind">15 Km/hr</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- History panel -->
  <div class="history-panel">
    <div class="history-header">
      <h3>🕒 Recent Searches</h3>
      <button class="clear-btn" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="history-list"></div>
  </div>

</div>
  <script src="script.js">

<script>
  // ── Init Supabase ──
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  const apiKey = "eb3e3266efd53409d703de8f80864799";
  const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

  let currentUser = null;
  let authMode = "login";

  // ── Auth tab switch ──
  function switchTab(mode) {
    authMode = mode;
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'signup' && i === 1));
    });
    document.getElementById('auth-btn-text').textContent = mode === 'login' ? 'Login' : 'Create Account';
    document.getElementById('auth-error').textContent = '';
  }

  // ── Handle login / signup ──
  async function handleAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    const btnText  = document.getElementById('auth-btn-text');

    if (!email || !password) { errEl.textContent = 'Please fill in both fields.'; return; }

    btnText.innerHTML = '<span class="spinner"></span>';
    errEl.textContent = '';

    let result;
    if (authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }

    if (result.error) {
      errEl.textContent = result.error.message;
      btnText.textContent = authMode === 'login' ? 'Login' : 'Create Account';
    } else {
      // session will fire onAuthStateChange
    }
  }

  // ── Logout ──
  async function handleLogout() {
    await sb.auth.signOut();
  }

  // ── Auth state listener ──
  sb.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
      currentUser = session.user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display  = 'block';
      document.getElementById('user-email-display').textContent = currentUser.email;
      loadHistory();
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display  = 'none';
      document.getElementById('history-list').innerHTML    = '';
    }
  });

  // ── Weather fetch (original logic preserved) ──
  async function checkWeather(city) {
    const response = await fetch(`${apiUrl}${city}&appid=${apiKey}`);

    if (response.status === 404) {
      document.querySelector(".error").style.display  = "block";
      document.querySelector(".weather").style.display = "none";
      return null;
    }

    const data = await response.json();

    document.querySelector(".city").innerHTML     = data.name;
    document.querySelector(".temp").innerHTML     = Math.round(data.main.temp) + "°c";
    document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
    document.querySelector(".wind").innerHTML     = data.wind.speed + " Km/hr";

    const icon = document.getElementById("weathericon");
    const cond = data.weather[0].main;
    if      (cond === "Clouds") icon.src = "image copy.png";
    else if (cond === "Clear")  icon.src = "clear-sky.png";
    else if (cond === "Rain")   icon.src = "thunder ico.png";
    else if (cond === "Drizzle") icon.src = "windy.png";
    else if (cond === "Mist")   icon.src = "foggy_3621514.png";

    document.querySelector(".weather").style.display = "block";
    document.querySelector(".error").style.display   = "none";

    return { city: data.name, temp: Math.round(data.main.temp) + "°c" };
  }

  // ── Trigger search + save ──
  async function triggerSearch() {
    const city = document.getElementById('search-input').value.trim();
    if (!city) return;
    const result = await checkWeather(city);
    if (result && currentUser) {
      await saveSearch(result.city, result.temp);
    }
  }

  // ── Enter key support ──
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') triggerSearch();
    });
    document.getElementById('auth-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAuth();
    });
  });

  // ── Save search to Supabase ──
  async function saveSearch(city, temp) {
    await sb.from('search_history').insert({
      user_id: currentUser.id,
      city,
      temp
    });
    loadHistory();
  }

  // ── Load history from Supabase ──
  async function loadHistory() {
    const { data, error } = await sb
      .from('search_history')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('searched_at', { ascending: false })
      .limit(10);

    if (error) return;
    renderHistory(data);
  }

  // ── Render history ──
  function renderHistory(items) {
    const list = document.getElementById('history-list');
    if (!items || items.length === 0) { list.innerHTML = ''; return; }

    list.innerHTML = items.map(item => {
      const time = new Date(item.searched_at).toLocaleString('en-IN', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      return `
        <div class="history-item" onclick="searchFromHistory('${item.city}')">
          <div class="history-item-left">
            <span>🌤</span>
            <div>
              <div class="history-item-city">${item.city}</div>
              <div class="history-item-temp">${item.temp ?? ''}</div>
            </div>
          </div>
          <div class="history-item-time">${time}</div>
        </div>`;
    }).join('');
  }

  // ── Click history item to re-search ──
  async function searchFromHistory(city) {
    document.getElementById('search-input').value = city;
    const result = await checkWeather(city);
    if (result && currentUser) await saveSearch(result.city, result.temp);
  }

  // ── Clear all history ──
  async function clearHistory() {
    if (!currentUser) return;
    await sb.from('search_history').delete().eq('user_id', currentUser.id);
    document.getElementById('history-list').innerHTML = '';
  }
</script>
</body>
</html>
