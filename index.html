<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Modern Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn">Search</button>
            </div>
        </header>

        <main class="weather-card" id="weather-card">
            <div class="current-weather">
                <h2 id="city-name">London, UK</h2>
                <p id="date">Thursday, May 7</p>
                <div class="temp-container">
                    <img src="https://openweathermap.org/img/wn/01d@2x.png" id="weather-icon" alt="weather icon">
                    <h1 id="temperature">20°C</h1>
                </div>
                <p id="description">Clear Sky</p>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <span>Humidity</span>
                    <strong id="humidity">45%</strong>
                </div>
                <div class="detail-item">
                    <span>Wind Speed</span>
                    <strong id="wind-speed">12 km/h</strong>
                </div>
            </div>
        </main>

        <section class="forecast">
            <h3>5-Day Forecast</h3>
            <div class="forecast-container" id="forecast-container">
                </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
