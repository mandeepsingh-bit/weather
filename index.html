 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="style.css" />

</head>

<body>
    <div class="card">

        <div class="search">
            <input type="search" placeholder="Enter City Name" spellcheck="false">
            <button><img src="Screenshot 2026-01-25 212700.png"></button>
        </div>

        <div class="error">
            <p>Invalid City</p>
        </div>

        <br><br>

        <div class="weather">
            <img src="thunder ico.png" class="weathericon" width="170px" height="170px" />
            <!--<img src="WhatsApp Image 2025-11-11 at 02.36.56_308519b0.jpg" class="weathericon" width="170px" height="170px" />
            <img src="thunder ico.png" class="weathericon" width="170px" height="170px" />
            <img src="thunder ico.png" class="weathericon" width="170px" height="170px" />-->

            <br><br>
            <h1 class="temp">22°c</h1>
            <br>
            <h2 class="city">New York</h2>

            <div class="details">

                <div class="col">
                    <img src="thermameter.png" width="50px" height="50px" />
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <img src="windy.png" width="50px" height="50px" />
                    <div>
                        <p class="wind">15 Km/hr</p>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
